name: Discover participants

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: discover
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Run discover pipeline
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          PIPELINE_TRIGGER: workflow_dispatch
        run: npm run discover

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ public/data/
          if git diff --staged --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "discover: rapport $(date +%Y-%m-%d_%H-%M)"
          for attempt in 1 2 3; do
            git pull --rebase origin main
            if git push origin main; then
              exit 0
            fi
            echo "Push rejected (attempt ${attempt}/3), retrying..."
            sleep 5
          done
          echo "Push failed after 3 attempts"
          exit 1
