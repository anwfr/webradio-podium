name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'public/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:
  # Les commits bot (scrape / discover) ne déclenchent pas le push ci-dessus.
  workflow_run:
    workflows:
      - Scrape votes
      - Discover participants
    types:
      - completed
    branches:
      - main

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      github.event_name != 'workflow_run'
      || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: >-
            ${{ github.event_name == 'workflow_run'
                && github.event.workflow_run.head_sha
                || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Generate site-config.json
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          SITE_BASE_URL: https://webradio.uid.fr
        run: node --input-type=module -e "import { writeSiteConfig } from './scripts/publish-data.js'; writeSiteConfig();"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - id: deployment
        uses: actions/deploy-pages@v4
