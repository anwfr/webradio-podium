name: Scrape votes

on:
  schedule:
    # GitHub cron = UTC. Minutes décalées : les créneaux à :00 UTC sont souvent
    # retardés ou ignorés (surtout 4h/9h UTC). Voir docs/specifications/deploiement.md.
    # Été (UTC+2) : ~6h17 / ~11h23 / ~16h41 Paris. Hiver : -1h.
    - cron: '17 4 * * *'
    - cron: '23 9 * * *'
    - cron: '41 14 * * *'
  workflow_dispatch:

env:
  TZ: Europe/Paris

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Run pipeline
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          PIPELINE_TRIGGER: ${{ github.event_name == 'workflow_dispatch' && 'manual' || 'schedule' }}
        run: npm run pipeline

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ public/data/
          if git diff --staged --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "data: snapshot $(date +%Y-%m-%d_%H-%M)"
          for attempt in 1 2 3; do
            git pull --rebase origin main
            if git push origin main; then
              exit 0
            fi
            echo "Push rejected (attempt ${attempt}/3), retrying..."
            sleep 5
          done
          echo "Push failed after 3 attempts"
          exit 1
